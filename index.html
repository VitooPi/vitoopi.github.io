<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人站 | 专业作品集</title>
    <style>
        :root {
            --edu-blue: #2c3e50;
            --tech-green: #1abc9c;
            --sound-purple: #8e44ad;
            --about-gray: #7f8c8d;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #fff;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        header h1 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 核心板块网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            border-top: 5px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* 各板块特定样式 */
        .edu-card { border-top-color: var(--edu-blue); }
        .tech-card { border-top-color: var(--tech-green); }
        .sound-card { border-top-color: var(--sound-purple); }
